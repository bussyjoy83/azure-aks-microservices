apiVersion: apps/v1
kind: Deployment
metadata:
  name: shoe-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shoe-backend
  template:
    metadata:
      labels:
        app: shoe-backend
    spec:
      containers:
        - name: backend
          image: osatuyi090.azurecr.io/backend:v1
          imagePullPolicy: Always
 
          ports:
            - containerPort: 5000
 
          envFrom:
            - secretRef:
                name: postgres-secret
 
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
 
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10